margin:0;
font-family:"Segoe UI",sans-serif;
color:#3e2f1c;
text-align:center;

background-color:#f4e6c3;

background-image:
radial-gradient(circle at 0 0, rgba(139,111,71,0.18) 2px, transparent 2px),
radial-gradient(circle at 40px 40px, rgba(139,111,71,0.18) 2px, transparent 2px);

background-size:80px 80px;
}

header{
padding:25px;
font-size:30px;
font-weight:bold;
background:#8b6f47;
color:white;
}

.subtitle{
font-size:16px;
margin-top:6px;
}

.container{
padding:30px 20px;
}

.buttons{
display:flex;
flex-direction:column;
gap:20px;
max-width:320px;
margin:auto;
}

.main-btn{
padding:18px;
font-size:18px;
border:none;
border-radius:12px;
background:#8b6f47;
color:white;
cursor:pointer;
transition:0.3s;
}

.main-btn:hover{
background:#6d5538;
}

.section{
display:none;
padding:15px;
}

.back-btn{
margin-top:10px;
padding:10px 20px;
border:none;
border-radius:8px;
background:#8b6f47;
color:white;
cursor:pointer;
}

/* Quran reader */

.reader-container{
width:100%;
height:85vh;
margin-top:15px;
}

iframe{
width:100%;
height:100%;
border:none;
border-radius:8px;
background:white;
}

/* Audio cards */

.audio-card{
background:#fff7e6;
margin:15px auto;
padding:15px;
border-radius:12px;
max-width:420px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

audio{
width:100%;
margin-top:10px;
}

.arabic{
font-size:20px;
direction:rtl;
font-weight:bold;
}

<h3>${s[0]}</h3>
<div class="arabic">${s[1]}</div>
<audio controls>
